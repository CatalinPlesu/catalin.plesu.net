		<aside data-panel aria-label="Guestbook">
			<h3>Guestbook</h3>
			<p>Leave a note, question, or hello.</p>
			<section id="guestbook-widget" aria-label="Guestbook widget" aria-live="polite"></section>
			<script>
				const widgetHost = document.getElementById("guestbook-widget");
				const loadGuestbook = () => {
					if (!widgetHost || widgetHost.dataset.loaded === "true") {
						return;
					}
					const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
					const script = document.createElement("script");
					script.async = true;
					script.src = "https://telegram.org/js/telegram-widget.js?23";
					script.setAttribute("data-telegram-discussion", "catalinplesunet/4");
					script.setAttribute("data-comments-limit", "10");
					script.setAttribute("data-colorful", "1");
					if (prefersDark) {
						script.setAttribute("data-dark", "1");
					}
					widgetHost.dataset.loaded = "true";
					widgetHost.appendChild(script);
					};
					if ("requestIdleCallback" in window) {
						window.requestIdleCallback(loadGuestbook, { timeout: 1500 });
						} else {
							window.setTimeout(loadGuestbook, 800);
						}
			</script>
		</aside>

		<footer data-site-footer>
			<address aria-label="Location">Chișinău, Moldova · UTC+2</address>
		</footer>
